[project]
name = "aide"
version = "0.1.0"
description = "AI Direction & Execution — a multi-agent workflow engine that simulates an IT company: CTO → Architect → SWEs."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "langgraph>=0.4",
    "langchain>=0.3",
    "langchain-anthropic>=0.3",
    "langchain-openai>=0.3",
    "pyyaml>=6.0",
    "python-dotenv>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
